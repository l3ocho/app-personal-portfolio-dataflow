version: 2

models:
  - name: int_rentals__annual
    description: "Rental data enriched with time and zone dimensions"
    columns:
      - name: rental_id
        data_tests:
          - unique
          - not_null
      - name: zone_code
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_dimensions__cmhc_zones')
              field: zone_code

  - name: int_neighbourhood__foundation
    description: "Neighbourhood foundation: census demographics (with CPI imputation) + ~55 extended scalar indicators from fact_census_extended. Supersedes int_neighbourhood__demographics. Grain: one row per neighbourhood per census year (316 rows: 158 × 2). 26 of the 34 new neighbourhood IDs (141-174) lacked real 2016 census data; synthetic 2016 rows are generated from their 2021 baseline (population and rates carried forward, income/education/dwelling CPI-imputed). These rows are flagged is_split_estimated=TRUE. The other 8 new IDs (142, 146, 147, 149, 155, 156, 158, 172) have real 2016 census data and flow through naturally."
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: census_year
        description: "Census year (2016 or 2021)"
        data_tests:
          - not_null
      - name: income_quintile
        description: "Income quintile (1-5, city-wide). Recomputed over all 316 rows partitioned by census_year."
      - name: is_imputed
        description: "True if income/education/dwelling values are CPI-adjusted estimates (2016 rows)"
      - name: is_split_estimated
        description: "True for 26 of the 34 new neighbourhood IDs (141-174) at census_year=2016. These IDs had no real 2016 census data; their 2016 rows are synthesised from their own 2021 values (population + rates carried forward, income CPI-imputed)."
      - name: pop_0_to_14
        description: "Population aged 0–14 (children). From census_extended, 2021 only; NULL for 2016."
      - name: pop_15_to_24
        description: "Population aged 15–24 (youth). From census_extended, 2021 only; NULL for 2016."
      - name: pop_25_to_64
        description: "Population aged 25–64 (working age). From census_extended, 2021 only; NULL for 2016."
      - name: pop_65_plus
        description: "Population aged 65+ (seniors). From census_extended, 2021 only; NULL for 2016."

  - name: int_neighbourhood__demographics
    description: "DEPRECATED (Sprint 13) — superseded by int_neighbourhood__foundation. Kept for backward compatibility."
    meta:
      deprecated: true
      superseded_by: int_neighbourhood__foundation
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: census_year
        description: "Census year"
        data_tests:
          - not_null
      - name: income_quintile
        description: "Income quintile (1-5, city-wide)"

  - name: int_neighbourhood__housing_unified
    description: "Unified housing intermediate: census tenure metrics joined with CMHC rentals pivoted to wide format (4 bedroom types per metric). Affordability metrics computed from int_neighbourhood__foundation income (income NOT surfaced in SELECT — lives in mart_neighbourhood_people). YoY rent change pct computed from allocated neighbourhood rents per bedroom type. Columns duplicated in mart_neighbourhood_people are excluded. Grain: neighbourhood × rental year."
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: year
        description: "Rental year"
        data_tests:
          - not_null
      - name: census_year
        description: "Most recent census year ≤ rental year (census data carried forward)"
      - name: housing_occupied_owner_pct
        description: "Percentage of dwellings owner-occupied"
      - name: housing_occupied_renter_pct
        description: "Percentage of dwellings renter-occupied"
      - name: housing_rent_2bed_avg
        description: "Area-weighted average rent for 2-bedroom units (CMHC, allocated to neighbourhood)"
      - name: housing_rent2income_pct
        description: "Rent-to-income ratio. Formula: (2bed_avg_rent × 12) / median_household_income × 100. Income sourced from int_neighbourhood__foundation; not surfaced in mart output."
      - name: housing_affordable
        description: "Boolean affordability flag. Formula: 2bed annual rent ≤ 30% of median household income."
      - name: housing_affordability_index
        description: "Affordability index. Formula: neighbourhood rent2income_pct / city_avg_rent2income_pct × 100. 100 = city average for the year."
      - name: housing_affordability_pressure_score
        description: "Composite affordability pressure score (0–100). Weights: 2-bed rent-to-income burden (50%) + renter share (30%) + low vacancy penalty (20%)."
      - name: housing_turnover_rate
        description: "Turnover rate reference — 2-bedroom as primary scalar proxy for callers expecting a single value."

  - name: int_neighbourhood__housing
    description: "Housing indicators combining census and rental data"
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: year
        description: "Reference year"
      - name: rent_to_income_pct
        description: "Rent as percentage of median income"
      - name: is_affordable
        description: "Boolean: rent <= 30% of income"

  - name: int_neighbourhood__crime_summary
    description: "Aggregated crime with year-over-year trends"
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: year
        description: "Statistics year"
        data_tests:
          - not_null
      - name: crime_rate_per_100k
        description: "Total crime rate per 100K population"
      - name: yoy_change_pct
        description: "Year-over-year change percentage"

  - name: int_neighbourhood__people
    description: "Unified people profile: demographics + amenities + geometry at neighbourhood × census_year grain (316 rows: 158 × 2). Direct source for mart_neighbourhood_people. City averages and indices are partitioned by census_year so 2016 and 2021 are calibrated independently. Amenities use latest available year for both census rows."
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: census_year
        description: "Census year (2016 or 2021)"
        data_tests:
          - not_null

  - name: int_neighbourhood__amenity_scores
    description: "Normalized amenities per capita and per area"
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: year
        description: "Reference year"
      - name: total_amenities_per_1000
        description: "Total amenities per 1000 population"
      - name: amenities_per_sqkm
        description: "Total amenities per square km"

  - name: int_rentals__neighbourhood_allocated
    description: "CMHC rental data allocated to neighbourhoods via area weights. Pivoted to one row per neighbourhood per year."
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: year
        description: "Survey year"
        data_tests:
          - not_null
      - name: avg_rent_2bed
        description: "Weighted average 2-bedroom rent"
      - name: vacancy_rate
        description: "Weighted average vacancy rate (avg across bedroom types)"
      - name: turnover_rate
        description: "Weighted average turnover rate (avg across bedroom types, area-weighted from CMHC zones)"
      - name: rental_universe_estimate
        description: "Total rental units estimate (area-weighted from CMHC zones)"
      - name: year_over_year_rent_change
        description: "Weighted average YoY rent change (avg across bedroom types, area-weighted from CMHC zones)"
      - name: is_estimated
        description: "Always TRUE — these are zone-level estimates allocated to neighbourhood level"

  - name: int_toronto__neighbourhood_profile
    description: "Neighbourhood community profile with computed percentages and diversity"
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_toronto__neighbourhoods')
              field: neighbourhood_id
      - name: census_year
        description: "Census year"
        data_tests:
          - not_null
      - name: category
        description: "Profile category"
        data_tests:
          - not_null
      - name: subcategory
        description: "Specific subcategory"
        data_tests:
          - not_null
      - name: pct_of_neighbourhood
        description: "Percentage of neighbourhood total within category"
      - name: pct_of_city
        description: "Percentage of city-wide total"
      - name: rank_in_neighbourhood
        description: "Rank within neighbourhood and category"
      - name: diversity_index
        description: "Shannon diversity index (visible_minority only)"
