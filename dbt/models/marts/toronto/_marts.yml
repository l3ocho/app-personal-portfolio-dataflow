version: 2

models:
  - name: mart_neighbourhood_geometry
    description: "Canonical neighbourhood boundaries for map rendering. Grain: one row per neighbourhood (158 rows). Single source of truth for geometry data used by analytical marts via neighbourhood_id FK."
    columns:
      - name: neighbourhood_id
        description: "Primary key. Unique neighbourhood identifier."
        data_tests:
          - unique
          - not_null
      - name: neighbourhood_name
        description: "Official neighbourhood name."
        data_tests:
          - not_null
      - name: geometry
        description: "Neighbourhood boundary polygon (MULTIPOLYGON, SRID 4326)."
        data_tests:
          - not_null

  - name: mart_neighbourhood_overview
    description: "Neighbourhood overview with composite livability score"
    meta:
      dashboard_tab: Overview
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('mart_neighbourhood_geometry')
              field: neighbourhood_id
      - name: livability_score
        description: "Composite score: safety (30%), affordability (40%), amenities (30%)"
      - name: safety_score
        description: "Safety component score (0-100)"
      - name: affordability_score
        description: "Affordability component score (0-100)"
      - name: amenity_score
        description: "Amenity component score (0-100)"

  - name: mart_neighbourhood_housing
    description: "Unified housing analysis by neighbourhood. Grain: one row per neighbourhood per rental year. Replaces former mart_neighbourhood_housing (scalar census-only) and mart_neighbourhood_housing_rentals (long format). Bedroom-type metrics pivoted to wide (4 columns per metric). Income-based columns (median_household_income, average_dwelling_value, shelter costs, dwelling/bedroom/construction pivots) are available in mart_neighbourhood_people and intentionally excluded here."
    meta:
      dashboard_tab: Housing
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('mart_neighbourhood_geometry')
              field: neighbourhood_id
      - name: year
        description: "Rental year"
        data_tests:
          - not_null
      - name: census_year
        description: "Most recent census year ≤ rental year (census data carried forward via CPI imputation)"
      - name: housing_occupied_owner_pct
        description: "Percentage of dwellings owner-occupied"
      - name: housing_occupied_renter_pct
        description: "Percentage of dwellings renter-occupied"
      - name: housing_rent_bachelor_avg
        description: "Area-weighted average rent for bachelor units (CMHC, allocated to neighbourhood)"
      - name: housing_rent_1bed_avg
        description: "Area-weighted average rent for 1-bedroom units (CMHC, allocated to neighbourhood)"
      - name: housing_rent_2bed_avg
        description: "Area-weighted average rent for 2-bedroom units (CMHC, allocated to neighbourhood). Primary reference unit for affordability calculations."
      - name: housing_rent_3bed_avg
        description: "Area-weighted average rent for 3-bedroom units (CMHC, allocated to neighbourhood)"
      - name: housing_rent_yoy_bachelor
        description: "Year-over-year rent change (absolute) for bachelor units, from CMHC source (area-weighted)"
      - name: housing_rent_yoy_1bed
        description: "Year-over-year rent change (absolute) for 1-bedroom units, from CMHC source (area-weighted)"
      - name: housing_rent_yoy_2bed
        description: "Year-over-year rent change (absolute) for 2-bedroom units, from CMHC source (area-weighted)"
      - name: housing_rent_yoy_3bed
        description: "Year-over-year rent change (absolute) for 3-bedroom units, from CMHC source (area-weighted)"
      - name: housing_rent_yoy_pct_bachelor
        description: "Year-over-year rent change percentage for bachelor units (computed from allocated neighbourhood rents)"
      - name: housing_rent_yoy_pct_1bed
        description: "Year-over-year rent change percentage for 1-bedroom units (computed from allocated neighbourhood rents)"
      - name: housing_rent_yoy_pct_2bed
        description: "Year-over-year rent change percentage for 2-bedroom units (computed from allocated neighbourhood rents)"
      - name: housing_rent_yoy_pct_3bed
        description: "Year-over-year rent change percentage for 3-bedroom units (computed from allocated neighbourhood rents)"
      - name: housing_vacancy_rate_bachelor
        description: "Area-weighted vacancy rate for bachelor units"
      - name: housing_vacancy_rate_1bed
        description: "Area-weighted vacancy rate for 1-bedroom units"
      - name: housing_vacancy_rate_2bed
        description: "Area-weighted vacancy rate for 2-bedroom units"
      - name: housing_vacancy_rate_3bed
        description: "Area-weighted vacancy rate for 3-bedroom units"
      - name: housing_turnover_rate_bachelor
        description: "Area-weighted turnover rate for bachelor units"
      - name: housing_turnover_rate_1bed
        description: "Area-weighted turnover rate for 1-bedroom units"
      - name: housing_turnover_rate_2bed
        description: "Area-weighted turnover rate for 2-bedroom units"
      - name: housing_turnover_rate_3bed
        description: "Area-weighted turnover rate for 3-bedroom units"
      - name: housing_rental_universe_est_bachelor
        description: "Proportional rental universe estimate (area-weighted) for bachelor units"
      - name: housing_rental_universe_est_1bed
        description: "Proportional rental universe estimate (area-weighted) for 1-bedroom units"
      - name: housing_rental_universe_est_2bed
        description: "Proportional rental universe estimate (area-weighted) for 2-bedroom units"
      - name: housing_rental_universe_est_3bed
        description: "Proportional rental universe estimate (area-weighted) for 3-bedroom units"
      - name: housing_rental_units
        description: "Total rental units across all bedroom types (sum of area-weighted estimates)"
      - name: housing_rent2income_pct
        description: "Rent-to-income ratio. Formula: (2bed_avg_rent × 12) / median_household_income × 100. Income sourced from int_neighbourhood__foundation; not surfaced in this mart."
      - name: housing_affordable
        description: "Boolean affordability flag. Formula: 2bed annual rent ≤ 30% of median household income."
      - name: housing_affordability_index
        description: "Affordability index. Formula: neighbourhood rent2income_pct / city_avg_rent2income_pct × 100. 100 = city average for the year. ⚠️ mart_neighbourhood_overview reads this as `affordability_index` — follow-up rename required there."
      - name: housing_affordability_pressure_score
        description: "Composite affordability pressure score (0–100). Weights: 2-bed rent-to-income burden (50%) + renter share (30%) + low vacancy penalty (20%)."
      - name: housing_turnover_rate
        description: "Turnover rate scalar reference — 2-bed value. For callers expecting a single turnover_rate column."

  - name: mart_neighbourhood_safety
    description: "Crime rates and safety metrics by neighbourhood"
    meta:
      dashboard_tab: Safety
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('mart_neighbourhood_geometry')
              field: neighbourhood_id
      - name: crime_rate_per_100k
        description: "Total crime rate per 100K population"
      - name: crime_index
        description: "100 = city average crime rate"
      - name: safety_tier
        description: "Safety tier (1=safest, 5=highest crime)"
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]

  - name: mart_neighbourhood_people
    description: "Unified neighbourhood profile combining demographics, amenities, and geometry. One row per neighbourhood per census year (316 rows: 158 × 2). Replaces mart_neighbourhood_demographics and mart_neighbourhood_amenities. BREAKING CHANGE (Sprint 16): grain changed from 158 to 316 rows."
    meta:
      dashboard_tab: People
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('mart_neighbourhood_geometry')
              field: neighbourhood_id
      - name: census_year
        description: "Census year (2016 or 2021). Grain key alongside neighbourhood_id."
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [2016, 2021]
      - name: neighbourhood_name
        description: "Official neighbourhood name"
        data_tests:
          - not_null
      - name: pop
        description: "Total population (census year)"
      - name: pop_density
        description: "Population per square km (census year)"
      - name: pop_0_to_14
        description: "Population aged 0–14 (children). From census_extended, 2021 only; NULL for 2016."
      - name: pop_15_to_24
        description: "Population aged 15–24 (youth). From census_extended, 2021 only; NULL for 2016."
      - name: pop_25_to_64
        description: "Population aged 25–64 (working age). From census_extended, 2021 only; NULL for 2016."
      - name: pop_65_plus
        description: "Population aged 65+ (seniors). From census_extended, 2021 only; NULL for 2016."
      - name: age_md
        description: "Median age"
      - name: age_city_avg
        description: "City-wide average median age"
      - name: age_index
        description: "100 = city average age"
      - name: edu_bachelors_pct
        description: "% of population with bachelor's degree or higher"
      - name: edu_nonbachelors_pct
        description: "Complement of edu_bachelors_pct. Formula: 100 - edu_bachelors_pct"
      - name: income_household_md
        description: "Median household income (CPI-adjusted to 2021 dollars)"
      - name: income_household_avg
        description: "Average household income (CPI-adjusted to 2021 dollars)"
      - name: income_quintile
        description: "City-wide income quintile (1=lowest, 5=highest)"
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
      - name: income_city_avg
        description: "City-wide average median household income"
      - name: income_index
        description: "100 = city average income"
      - name: unemployment_rate
        description: "Neighbourhood unemployment rate"
      - name: unemployment_city_rate
        description: "City-wide average unemployment rate"
      - name: unemployment_index
        description: "100 = city average unemployment. Formula: unemployment_rate / unemployment_city_rate * 100"
      - name: housing_occupied_owner
        description: "% of dwellings owner-occupied"
      - name: housing_occupied_renter
        description: "% of dwellings renter-occupied"
      - name: housing_dwelling_value_avg
        description: "Average dwelling value"
      - name: housing_tenure_diversity_index
        description: "Herfindahl complement on owner/renter split. 0 = single tenure, ~50 = perfectly mixed"
      - name: amenities_parks
        description: "Raw park count"
      - name: amenities_parks_1k
        description: "Parks per 1000 population"
      - name: amenities_parks_city_1k
        description: "City-wide average parks per 1000 population"
      - name: amenities_parks_index
        description: "100 = city average parks access"
      - name: amenities_schools
        description: "Raw school count"
      - name: amenities_schools_1k
        description: "Schools per 1000 population"
      - name: amenities_schools_city_1k
        description: "City-wide average schools per 1000 population"
      - name: amenities_schools_index
        description: "100 = city average schools access"
      - name: amenities_libraries
        description: "Raw library count"
      - name: amenities_libraries_1k
        description: "Libraries per 1000 population (computed)"
      - name: amenities_libraries_city_1k
        description: "City-wide average libraries per 1000 population"
      - name: amenities_libraries_index
        description: "100 = city average libraries access"
      - name: amenities_childcare
        description: "Raw childcare facility count"
      - name: amenities_childcare_1k
        description: "Childcare facilities per 1000 population (computed)"
      - name: amenities_childcare_city_1k
        description: "City-wide average childcare per 1000 population"
      - name: amenities_childcare_index
        description: "100 = city average childcare access"
      - name: amenities_commcentres
        description: "Raw community centre count"
      - name: amenities_commcentres_1k
        description: "Community centres per 1000 population (computed)"
      - name: amenities_commcentres_city_1k
        description: "City-wide average community centres per 1000 population"
      - name: amenities_commcentres_index
        description: "100 = city average community centre access"
      - name: amenities
        description: "Total raw amenity count"
      - name: amenities_1k
        description: "Total amenities per 1000 population"
      - name: amenities_city_1k
        description: "City-wide average total amenities per 1000 population"
      - name: amenities_index
        description: "100 = city average total amenities access"
      - name: amenities_tier
        description: "Amenity tier (1=best, 5=lowest) by ntile(5) on amenities_1k"
        data_tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]
      - name: transit_count
        description: "Raw transit stop count"
      - name: transit_1k
        description: "Transit stops per 1000 population"
      - name: transit_city_1k
        description: "City-wide average transit stops per 1000 population"
      - name: transit_index
        description: "100 = city average transit access"
      - name: car_dependency_pct
        description: "% of commuters using car (driver or passenger)"
      - name: commute_car_pct
        description: "% of commuters using car (same as car_dependency_pct)"
      - name: commute_transit_pct
        description: "% of commuters using public transit"
      - name: commute_active_pct
        description: "% of commuters walking or cycling"
      - name: commute_long_pct
        description: "% of commuters with 45+ minute commute"

  - name: mart_neighbourhood_profile
    description: "Neighbourhood community profile analytical table with all demographics breakdown"
    meta:
      dashboard_tab: Profile
    columns:
      - name: neighbourhood_id
        description: "Neighbourhood identifier"
        data_tests:
          - not_null
          - relationships:
              to: ref('mart_neighbourhood_geometry')
              field: neighbourhood_id
      - name: census_year
        description: "Census year (2021)"
        data_tests:
          - not_null
      - name: category
        description: "Profile category"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - immigration_status
                  - place_of_birth
                  - place_of_birth_recent
                  - citizenship
                  - generation_status
                  - admission_category
                  - visible_minority
                  - ethnic_origin
                  - mother_tongue
                  - official_language
                  - language_at_home
                  - indigenous_identity
                  - religion
                  - education_level
                  - field_of_study
                  - commute_mode
                  - commute_duration
                  - commute_destination
                  - housing_suitability
                  - dwelling_type
                  - bedrooms
                  - construction_period
      - name: subcategory
        description: "Specific subcategory"
        data_tests:
          - not_null
      - name: pct_of_neighbourhood
        description: "Percentage of neighbourhood total within category"
      - name: city_total
        description: "City-wide total for this subcategory"
      - name: pct_of_city
        description: "Percentage of city total"
      - name: rank_in_neighbourhood
        description: "Rank within neighbourhood (1=highest)"
      - name: level
        description: "Hierarchy level (continent/country) for place_of_birth"
        data_tests:
          - accepted_values:
              arguments:
                values: ["", continent, country]
      - name: indent_level
        description: "Indentation depth from source XLSX (0 = section header, 1+ = subcategory)"
      - name: category_total
        description: "Total count for the category section header row (used as denominator for percentages)"
      - name: is_subtotal
        description: "True when indent_level > 0 (row is a subcategory, not a section header)"
      - name: diversity_index
        description: "Shannon diversity index (visible_minority rows only)"
